name: visuals
on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  visuals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: generate contribution radar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/gen_radar.py dist
      - name: fetch streak cards (camo times out on live streak-stats)
        run: |
          curl -sf --retry 3 --retry-delay 5 -o dist/streak-dark.svg "https://streak-stats.demolab.com?user=PraneeshRV&hide_border=true&background=00000000&ring=ff2fd6&fire=00e5ff&currStreakNum=ff2fd6&currStreakLabel=00e5ff&sideNums=9aa4c2&sideLabels=9aa4c2&dates=5a648a&stroke=1c2340"
          curl -sf --retry 3 --retry-delay 5 -o dist/streak-light.svg "https://streak-stats.demolab.com?user=PraneeshRV&hide_border=true&background=00000000&ring=40a02b&fire=df8e1d&currStreakNum=40a02b&currStreakLabel=4c4f69&sideNums=4c4f69&sideLabels=7c7f93&dates=8c8fa1&stroke=ccd0da"
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
