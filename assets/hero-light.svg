<svg width="900" height="260" viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praneesh R V — terminal">
  <defs>
    <clipPath id="c1clip"><rect x="96" y="66" width="0" height="22"><animate attributeName="width" values="0;0;56;56;56;0" keyTimes="0;0.035;0.1;0.965;0.985;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="c2clip"><rect x="96" y="124" width="0" height="22"><animate attributeName="width" values="0;0;74;74;74;0" keyTimes="0;0.3;0.386;0.965;0.985;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="c3clip"><rect x="96" y="182" width="0" height="22"><animate attributeName="width" values="0;0;140;140;140;0" keyTimes="0;0.6;0.7;0.965;0.985;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <!-- window -->
  <rect x="30" y="8" width="840" height="244" rx="12" fill="#eff1f5" stroke="#ccd0da"/>
  <path d="M30 44h840" stroke="#ccd0da"/>
  <rect x="30" y="8" width="840" height="36" rx="12" fill="#e6e9ef"/>
  <rect x="30" y="32" width="840" height="12" fill="#e6e9ef"/>
  <circle cx="56" cy="26" r="6" fill="#d20f39"/>
  <circle cx="76" cy="26" r="6" fill="#df8e1d"/>
  <circle cx="96" cy="26" r="6" fill="#40a02b"/>
  <text x="450" y="31" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#8c8fa1">praneesh@arch: ~</text>

  <g font-family="ui-monospace, 'Cascadia Code', Menlo, monospace" font-size="15">
    <!-- cmd 1 -->
    <text x="66" y="82" fill="#40a02b" font-weight="700">❯</text>
    <text x="96" y="82" fill="#4c4f69" textLength="56" clip-path="url(#c1clip)">whoami</text>
    <text x="66" y="108" fill="#7c7f93" opacity="0">cybersecurity undergrad · ai red teamer in training
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.115;0.125;0.965;1" dur="14s" calcMode="discrete" repeatCount="indefinite"/>
    </text>

    <!-- cmd 2 -->
    <g opacity="0">
      <text x="66" y="140" fill="#40a02b" font-weight="700">❯</text>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.28;0.29;0.965;1" dur="14s" calcMode="discrete" repeatCount="indefinite"/>
    </g>
    <text x="96" y="140" fill="#4c4f69" textLength="74" clip-path="url(#c2clip)">uname -o</text>
    <text x="66" y="166" fill="#7c7f93" opacity="0">Arch Linux (btw)
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.41;0.965;1" dur="14s" calcMode="discrete" repeatCount="indefinite"/>
    </text>

    <!-- cmd 3 -->
    <g opacity="0">
      <text x="66" y="198" fill="#40a02b" font-weight="700">❯</text>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.58;0.59;0.965;1" dur="14s" calcMode="discrete" repeatCount="indefinite"/>
    </g>
    <text x="96" y="198" fill="#4c4f69" textLength="140" clip-path="url(#c3clip)">./current_focus</text>
    <text x="66" y="224" fill="#8839ef" opacity="0">→ AI security research · building offensive tooling
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.71;0.72;0.965;1" dur="14s" calcMode="discrete" repeatCount="indefinite"/>
    </text>

    <!-- blinking cursor, parked after last output -->
    <g opacity="0">
      <rect x="66" y="236" width="9" height="16" fill="#4c4f69">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.72;0.73;0.965;1" dur="14s" calcMode="discrete" repeatCount="indefinite"/>
    </g>
